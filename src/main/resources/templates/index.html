<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 페이지</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            background: #1a1a2e;
            color: #fff;
            padding: 24px 0;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        header h1 { font-size: 2rem; letter-spacing: 2px; }
        header p  { margin-top: 6px; font-size: 0.9rem; color: #aaa; }
        main { width: 100%; max-width: 860px; padding: 40px 20px; }
        .category-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .category-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .category-header .number {
            background: #e94560;
            color: #fff;
            font-weight: 700;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .category-header h2 { font-size: 1.25rem; }
        .category-body { padding: 32px 28px; }
        .icon-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .icon-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 150px; height: 130px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            gap: 10px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
        }
        .icon-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.22); }
        .icon-btn:active { transform: scale(0.97); }
        .icon-btn .emoji { font-size: 2.4rem; }
        .btn-blue  { background: linear-gradient(135deg, #4285f4, #2b5fd9); }
        .btn-green { background: linear-gradient(135deg, #34a853, #1e7d3a); }
    </style>
</head>
<body>
<header>
    <h1>메인 페이지</h1>
    <p>Spring Boot 페이지 이동 데모</p>
</header>
<main>
    <div class="category-card">
        <div class="category-header">
            <span class="number">1</span>
            <h2>페이지 이동</h2>
        </div>
        <div class="category-body">
            <div class="icon-grid">
                <a href="/second" class="icon-btn btn-blue">
                    <span class="emoji">📄</span>
                    두번째페이지
                </a>
                <a href="/third-loading" class="icon-btn btn-green" id="btn-third">
                    <span class="emoji">📋</span>
                    세번째페이지
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
